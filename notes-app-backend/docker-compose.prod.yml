services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    expose:
      - "8000"
    env_file: .env
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    restart: always
